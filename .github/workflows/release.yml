name: Release

# Build distributable assets when a version tag (v#.#.#) is pushed, and attach
# them to a GitHub Release for that tag.
#
# macOS only for now. A Windows asset needs build.rs taught to link OCCT on MSVC
# (no -Wl,-rpath) plus OCCT provisioned via vcpkg — tracked as a follow-up.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write # create the release and upload assets

jobs:
  macos:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify the tag matches the crate version
        # A vX.Y.Z tag must equal the workspace Cargo.toml version, so a release
        # can never ship a binary whose About/--version disagrees with the tag.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$tag  crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::Tag v$tag does not match the crate version $crate (workspace Cargo.toml). Bump the version or fix the tag."
            exit 1
          fi

      - name: Install OpenCASCADE + dylibbundler
        # The runner image pre-taps aws/tap, which now trips Homebrew's tap-trust
        # check and prints a warning on every brew command. We don't use it, so
        # drop it before installing.
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install opencascade dylibbundler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          export CDT_OCCT_PREFIX="$(brew --prefix opencascade)"
          cargo build --release --locked -p cdt-app

      - name: Build Cadette.app bundle
        # Assemble a real .app bundle. dylibbundler copies every non-system dylib
        # the binary needs (OCCT and its deps) into Contents/Frameworks and
        # rewrites load paths to @executable_path/../Frameworks, so the app runs
        # without Homebrew installed. --search-path adds OCCT's lib dir so @rpath
        # inter-dependencies resolve.
        run: |
          APP="Cadette.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"
          cp target/release/cdt-app "$APP/Contents/MacOS/cadette"

          dylibbundler \
            --overwrite-dir --bundle-deps \
            --fix-file "$APP/Contents/MacOS/cadette" \
            --dest-dir "$APP/Contents/Frameworks" \
            --install-path "@executable_path/../Frameworks" \
            --search-path "$(brew --prefix opencascade)/lib"

          # CFBundleShortVersionString is the pushed tag with the leading v stripped.
          VERSION="${GITHUB_REF_NAME#v}"

          # App icon (Finder / Dock / About panel).
          cp assets/icon/Cadette.icns "$APP/Contents/Resources/Cadette.icns"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Cadette</string>
            <key>CFBundleExecutable</key>
            <string>cadette</string>
            <key>CFBundleIconFile</key>
            <string>Cadette</string>
            <key>CFBundleIdentifier</key>
            <string>org.cadette.app</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST

          # dylibbundler can add the same LC_RPATH (@executable_path/../Frameworks/)
          # to a dylib more than once, because it re-fixes a shared dependency for
          # each library that pulls it in. Modern dyld treats a duplicate LC_RPATH
          # as fatal, so a downloaded app crashes at launch with
          #   Library not loaded: @executable_path/../Frameworks/libtbb.*.dylib
          #   ... (duplicate LC_RPATH '@executable_path/../Frameworks/')
          # Collapse any duplicated rpath to a single entry on every Mach-O in the
          # bundle: for each value seen more than once, delete every copy then add
          # one back. Must run before codesign, since editing load commands
          # invalidates the signature.
          dedup_rpaths() {
            local f="$1" count value
            otool -l "$f" \
              | awk '/^[[:space:]]*cmd LC_RPATH/{rp=1;next} rp&&/^[[:space:]]*path /{print $2;rp=0}' \
              | sort | uniq -c \
              | while read -r count value; do
                  if [ "$count" -gt 1 ]; then
                    while install_name_tool -delete_rpath "$value" "$f" 2>/dev/null; do :; done
                    install_name_tool -add_rpath "$value" "$f"
                  fi
                done
          }
          for f in "$APP/Contents/MacOS/cadette" "$APP/Contents/Frameworks/"*.dylib; do
            dedup_rpaths "$f"
          done

          # dylibbundler runs install_name_tool, which invalidates the ad-hoc
          # code signature the linker applied. On Apple Silicon a binary with an
          # invalid signature is refused by the kernel and macOS reports the app
          # as "damaged and can't be opened". Re-sign ad-hoc (-s -), inside-out:
          # every bundled dylib first, then the bundle itself (which signs the
          # main executable). This is not Developer-ID signing or notarization,
          # so first launch still needs right-click -> Open, but the app runs.
          find "$APP/Contents/Frameworks" -name '*.dylib' -exec \
            codesign --force --timestamp=none --sign - {} +
          codesign --force --timestamp=none --sign - "$APP/Contents/MacOS/cadette"
          codesign --force --timestamp=none --sign - "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Package Cadette.app into a .dmg
        # Stage the app alongside an /Applications symlink so the mounted volume
        # offers a drag-to-install layout, then compress to a UDZO disk image.
        run: |
          STAGE="dmg-stage"
          mkdir -p "$STAGE"
          cp -R "Cadette.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname Cadette \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            cadette-macos-arm64.dmg

      - name: Publish release asset
        uses: softprops/action-gh-release@v3
        with:
          files: cadette-macos-arm64.dmg
